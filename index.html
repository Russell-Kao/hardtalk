<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>HARDtalk</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23D4A574'/></svg>">
<meta name="theme-color" content="#0A0A09">
<style>
:root {
  --bg: #0A0A09;
  --surface: #16161494;
  --surface-solid: #161614;
  --surface-2: #1F1F1C;
  --text: #F0EDE5;
  --text-2: #8A8680;
  --text-3: #5A5650;
  --border: rgba(255,255,255,0.06);
  --accent: #D4A574;
  --host: #C76B6B;
  --you: #6FAFA7;
  --highlight: rgba(212, 165, 116, 0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Noto Sans TC", "PingFang TC", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
  overflow-x: hidden;
  min-height: 100vh;
}

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,9,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
}
.topbar .logo { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.topbar .logo .dot { display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.icon-btn { width: 36px; height: 36px; border: none; background: var(--surface-2); color: var(--text-2); border-radius: 10px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.icon-btn:active { background: var(--accent); color: var(--bg); }

.loading { padding: 40px 20px; text-align: center; color: var(--text-2); font-size: 13px; }
.error { padding: 40px 20px; text-align: center; color: var(--host); font-size: 13px; line-height: 1.7; }
.error strong { color: var(--text); display: block; margin-bottom: 8px; }

.list-view { padding: 20px 18px 100px; }
.list-view.hide { display: none; }
.list-section-title { font-size: 11px; color: var(--text-3); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 14px; margin-top: 8px; }
.ep-row { background: var(--surface-solid); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; cursor: pointer; border: 0.5px solid var(--border); transition: transform 0.15s; }
.ep-row:active { transform: scale(0.98); }
.ep-row.done { border-left: 3px solid var(--you); padding-left: 16px; }
.ep-row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ep-num { font-size: 11px; color: var(--text-3); font-weight: 600; letter-spacing: 0.5px; }
.ep-num.done { color: var(--you); }
.ep-tag { font-size: 9px; padding: 2px 7px; background: rgba(255,255,255,0.06); color: var(--text-2); border-radius: 999px; }
.ep-title { font-size: 17px; font-weight: 500; line-height: 1.35; letter-spacing: -0.2px; }

.player-view { display: none; padding: 18px 18px 100px; }
.player-view.show { display: block; }
.episode-info { text-align: center; padding: 24px 12px 18px; }
.episode-num { font-size: 11px; letter-spacing: 1.5px; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
.episode-name { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; line-height: 1.3; margin-bottom: 8px; }
.episode-tagline { font-size: 12px; color: var(--text-2); line-height: 1.55; padding: 0 14px; }
.play-area { text-align: center; padding: 32px 0 16px; }
.big-play { width: 110px; height: 110px; border-radius: 50%; background: var(--accent); border: none; color: var(--bg); cursor: pointer; font-size: 38px; box-shadow: 0 12px 40px rgba(212, 165, 116, 0.25); transition: transform 0.15s; display: inline-flex; align-items: center; justify-content: center; }
.big-play:active { transform: scale(0.95); }
.big-play.playing { background: var(--host); box-shadow: 0 12px 40px rgba(199, 107, 107, 0.3); }
.big-play.loading { background: var(--surface-2); color: var(--text-3); cursor: wait; animation: pulse 1.4s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.progress-section { padding: 18px 4px 0; }
.progress-track { height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s linear; }
.progress-fill.playing { background: var(--host); }
.progress-times { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-3); font-family: -apple-system-monospaced-numbers, monospace; }
.engine-now { font-size: 10px; color: var(--text-3); }
.nav-row { display: flex; justify-content: space-between; gap: 10px; padding: 28px 0 18px; }
.nav-btn { flex: 1; background: var(--surface-2); border: none; color: var(--text); padding: 14px 12px; border-radius: 12px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn:active:not(:disabled) { background: var(--accent); color: var(--bg); }
.cc-toggle-row { display: flex; justify-content: center; gap: 8px; padding: 12px 0 18px; }
.cc-btn { background: var(--surface-2); border: 0.5px solid var(--border); color: var(--text-2); padding: 8px 14px; border-radius: 999px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; }
.cc-btn.on { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.transcript { display: none; padding-top: 8px; border-top: 0.5px solid var(--border); margin-top: 4px; }
.transcript.show { display: block; }
.line { margin-bottom: 14px; padding: 12px 14px; border-radius: 10px; cursor: pointer; border-left: 2px solid transparent; }
.line:active, .line.playing { background: var(--surface-2); }
.line.host { border-left-color: var(--host); }
.line.you { border-left-color: var(--you); }
.line-speaker { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
.line.host .line-speaker { color: var(--host); }
.line.you .line-speaker { color: var(--you); }
.line-en { font-size: 16px; line-height: 1.6; margin-bottom: 4px; color: var(--text); display: none; }
.line-en em { background: var(--highlight); padding: 1px 4px; border-radius: 3px; font-style: normal; font-weight: 500; }
.line-tw { font-size: 12px; color: var(--text-2); line-height: 1.5; display: none; }
.line-en.show, .line-tw.show { display: block; }

.done-mark { text-align: center; margin-top: 16px; }
.done-btn { background: transparent; border: 0.5px solid var(--border); color: var(--text-2); padding: 8px 18px; border-radius: 999px; font-size: 12px; cursor: pointer; font-family: inherit; }
.done-btn.done { background: var(--you); color: var(--bg); border-color: var(--you); }

.sheet-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; backdrop-filter: blur(4px); }
.sheet-mask.show { display: block; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface-solid); border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 24px 22px 38px; z-index: 201; transform: translateY(100%); transition: transform 0.25s ease-out; max-height: 90vh; overflow-y: auto; }
.sheet.show { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--text-3); border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-size: 17px; font-weight: 500; margin-bottom: 18px; }
.setting-label { font-size: 10px; color: var(--text-3); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
.setting-group { margin-bottom: 18px; }
.voice-pills { display: flex; gap: 4px; background: var(--surface-2); padding: 3px; border-radius: 9px; margin-bottom: 8px; }
.voice-pill { flex: 1; padding: 9px 6px; border: none; border-radius: 6px; background: transparent; font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; color: var(--text-2); text-align: center; }
.voice-pill.on { background: var(--surface-solid); color: var(--text); }
.voice-pill small { display: block; font-size: 9px; margin-top: 2px; opacity: 0.7; font-weight: 400; }
.key-input { width: 100%; background: var(--surface-2); border: 0.5px solid var(--border); color: var(--text); padding: 11px 14px; border-radius: 9px; font-size: 13px; font-family: "SF Mono", monospace; display: none; }
.key-input.show { display: block; }
.key-help { font-size: 11px; color: var(--text-2); line-height: 1.55; margin-top: 8px; display: none; }
.key-help.show { display: block; }
.key-help a { color: var(--accent); border-bottom: 1px dashed; text-decoration: none; }
.status-line { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.status-line .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); }
.status-line.ok .dot { background: var(--you); }
.speed-pills { display: flex; gap: 4px; background: var(--surface-2); padding: 3px; border-radius: 9px; }
.speed-pill { flex: 1; padding: 9px 6px; border: none; border-radius: 6px; background: transparent; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; color: var(--text-2); }
.speed-pill.on { background: var(--surface-solid); color: var(--text); }
.test-btn { width: 100%; background: var(--surface-2); border: 0.5px solid var(--border); color: var(--text); padding: 11px; border-radius: 9px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 10px; }
.test-result { font-size: 11px; line-height: 1.6; margin-top: 8px; padding: 10px; background: var(--surface-2); border-radius: 7px; display: none; white-space: pre-wrap; word-break: break-word; }
.sheet-close { width: 100%; background: var(--surface-2); border: none; color: var(--text); padding: 14px; border-radius: 11px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 8px; }
.version-tag { font-size: 10px; color: var(--text-3); text-align: center; padding: 6px; margin-bottom: 12px; }
.update-banner { display: none; background: var(--accent); color: var(--bg); padding: 12px 18px; text-align: center; font-size: 13px; font-weight: 500; align-items: center; justify-content: center; gap: 10px; }
.update-banner.show { display: flex; }
.update-banner button { background: var(--bg); color: var(--accent); border: none; padding: 7px 16px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.update-banner button:active { transform: scale(0.96); }
</style>
</head>
<body>

<div class="update-banner" id="update-banner">
  📦 有新版可用
  <button onclick="forceReload()">重新整理</button>
</div>

<div class="topbar">
  <div class="logo"><span class="dot"></span><span id="topbar-title">HARDtalk</span></div>
  <button class="icon-btn" onclick="openSheet()">⚙</button>
</div>

<div class="list-view" id="list-view">
  <div class="version-tag" id="version-tag">載入中...</div>
  <div class="list-section-title">📚 訪談清單</div>
  <div id="ep-list"><div class="loading">⏳ 載入訪談中...</div></div>
</div>

<div class="player-view" id="player-view">
  <div class="episode-info">
    <div class="episode-num" id="ep-num"></div>
    <div class="episode-name" id="ep-name"></div>
    <div class="episode-tagline" id="ep-tagline"></div>
  </div>
  <div class="play-area"><button class="big-play" id="big-play" onclick="playFull()">▶</button></div>
  <div class="progress-section">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-times">
      <span id="time-now">0:00</span>
      <span class="engine-now" id="engine-now">尚未播放</span>
      <span id="time-total">~5:30</span>
    </div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="navPrev()">◀ 上一集</button>
    <button class="nav-btn" onclick="backToList()">≡ 清單</button>
    <button class="nav-btn" id="next-btn" onclick="navNext()">下一集 ▶</button>
  </div>
  <div class="cc-toggle-row">
    <button class="cc-btn" id="cc-en-btn" onclick="toggleCC('en')">📜 英文逐字稿</button>
    <button class="cc-btn" id="cc-tw-btn" onclick="toggleCC('tw')">🇹🇼 中文翻譯</button>
  </div>
  <div class="transcript" id="transcript">
    <div id="lines"></div>
    <div class="done-mark"><button class="done-btn" id="done-btn" onclick="markDone()">✓ 標記讀熟</button></div>
  </div>
</div>

<div class="sheet-mask" id="sheet-mask" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">設定</div>
  <div class="setting-group">
    <div class="setting-label">語音引擎</div>
    <div class="voice-pills">
      <button class="voice-pill on" id="vp-browser" onclick="setProvider('browser')">內建<small>免費</small></button>
      <button class="voice-pill" id="vp-openai" onclick="setProvider('openai')">OpenAI<small>建議</small></button>
      <button class="voice-pill" id="vp-elevenlabs" onclick="setProvider('elevenlabs')">11Labs<small>最自然</small></button>
    </div>
    <input type="password" class="key-input" id="openai-key" placeholder="sk-..." onchange="saveOpenAIKey()">
    <input type="password" class="key-input" id="elevenlabs-key" placeholder="xi_..." onchange="saveElevenLabsKey()">
    <div class="key-help" id="openai-help"><a href="https://platform.openai.com/api-keys" target="_blank">取得 OpenAI key</a> · 需先儲值 $5</div>
    <div class="key-help" id="elevenlabs-help"><a href="https://elevenlabs.io/app/settings/api-keys" target="_blank">取得 ElevenLabs key</a> · 每月 10K 字免費</div>
    <div class="status-line" id="status-line"><span class="dot"></span><span id="status-text">瀏覽器內建</span></div>
    <button class="test-btn" onclick="testConnection()">🧪 測試 API 連線</button>
    <div class="test-result" id="test-result"></div>
  </div>
  <div class="setting-group">
    <div class="setting-label">播放速度</div>
    <div class="speed-pills">
      <button class="speed-pill" onclick="setSpeed(this, 0.8)">慢</button>
      <button class="speed-pill on" onclick="setSpeed(this, 0.92)">中</button>
      <button class="speed-pill" onclick="setSpeed(this, 1.0)">正常</button>
    </div>
  </div>
  <button class="sheet-close" onclick="closeSheet()">關閉</button>
</div>

<script>
// ===== State =====
const CLIENT_VERSION = '3';
const AUDIO_CACHE_NAME = 'hardtalk-audio-v1';
let provider = localStorage.getItem('mirror_provider') || 'browser';
let openaiKey = localStorage.getItem('mirror_openai_key') || '';
let elevenLabsKey = localStorage.getItem('mirror_elevenlabs_key') || '';
let speechRate = parseFloat(localStorage.getItem('mirror_rate') || '0.92');
let currentEpId = null;
let episodes = [];
let showEn = false;
let showTw = false;
let audioCache = {};

const ELEVEN_HOST = 'pNInz6obpgDQGcFmaJgB';
const ELEVEN_YOU = 'ErXwobaYiN019PkySvjV';

document.getElementById('openai-key').value = openaiKey;
document.getElementById('elevenlabs-key').value = elevenLabsKey;

// ===== Load episodes from JSON =====
async function loadEpisodes() {
  try {
    const r = await fetch('episodes.json?t=' + Date.now());  // cache bust
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    episodes = data.episodes;
    document.getElementById('version-tag').textContent = `v${data.version} · 更新於 ${data.lastUpdated} · 共 ${episodes.length} 集`;
    if (data.requiredClientVersion && String(data.requiredClientVersion) !== CLIENT_VERSION) {
      document.getElementById('update-banner').classList.add('show');
    }
    renderList();
  } catch (e) {
    document.getElementById('ep-list').innerHTML = `<div class="error"><strong>⚠️ 無法載入訪談資料</strong>${e.message}<br><br>確認 episodes.json 跟 index.html 在同個資料夾。</div>`;
  }
}
loadEpisodes();

// ===== Settings =====
function setProvider(p) {
  provider = p;
  localStorage.setItem('mirror_provider', p);
  ['browser', 'openai', 'elevenlabs'].forEach(x => {
    document.getElementById('vp-' + x).classList.toggle('on', p === x);
  });
  document.getElementById('openai-key').classList.toggle('show', p === 'openai');
  document.getElementById('elevenlabs-key').classList.toggle('show', p === 'elevenlabs');
  document.getElementById('openai-help').classList.toggle('show', p === 'openai');
  document.getElementById('elevenlabs-help').classList.toggle('show', p === 'elevenlabs');
  updateStatus();
}
function saveOpenAIKey() {
  openaiKey = document.getElementById('openai-key').value.trim();
  localStorage.setItem('mirror_openai_key', openaiKey);
  updateStatus();
}
function saveElevenLabsKey() {
  elevenLabsKey = document.getElementById('elevenlabs-key').value.trim();
  localStorage.setItem('mirror_elevenlabs_key', elevenLabsKey);
  updateStatus();
}
function updateStatus() {
  const line = document.getElementById('status-line');
  const text = document.getElementById('status-text');
  line.className = 'status-line';
  if (provider === 'elevenlabs' && elevenLabsKey) { line.classList.add('ok'); text.textContent = '✓ ElevenLabs'; }
  else if (provider === 'openai' && openaiKey) { line.classList.add('ok'); text.textContent = '✓ OpenAI'; }
  else if (provider === 'browser') text.textContent = '瀏覽器內建（iOS Siri / Android Google）';
  else text.textContent = '需要 API key';
}
setProvider(provider);

async function testConnection() {
  const result = document.getElementById('test-result');
  result.style.display = 'block';
  result.style.color = 'var(--text-2)';
  result.textContent = '⏳ 測試中...';
  if (provider === 'browser') { result.textContent = '瀏覽器內建不需要測試'; return; }
  if (provider === 'openai') {
    if (!openaiKey) { result.style.color = 'var(--host)'; result.textContent = '❌ 沒貼 key'; return; }
    try {
      const r = await fetch('https://api.openai.com/v1/audio/speech', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${openaiKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'tts-1', input: 'Testing OpenAI.', voice: 'echo', speed: 1 })
      });
      if (r.ok) {
        const blob = await r.blob();
        result.style.color = 'var(--you)';
        result.textContent = `✓ 成功！收到 ${blob.size} bytes\n馬上播給你聽 →`;
        new Audio(URL.createObjectURL(blob)).play();
      } else {
        const errText = await r.text();
        result.style.color = 'var(--host)';
        result.textContent = `❌ HTTP ${r.status}\n${errText.slice(0, 300)}`;
      }
    } catch (e) {
      result.style.color = 'var(--host)';
      result.textContent = `❌ ${e.message}\n\n如果在本機是 CORS 問題，需要部署到網域 (如 GitHub Pages)`;
    }
    return;
  }
  if (provider === 'elevenlabs') {
    if (!elevenLabsKey) { result.style.color = 'var(--host)'; result.textContent = '❌ 沒貼 key'; return; }
    try {
      const r = await fetch('https://api.elevenlabs.io/v1/user', { headers: { 'xi-api-key': elevenLabsKey } });
      if (r.ok) {
        const data = await r.json();
        const remaining = (data.subscription?.character_limit || 0) - (data.subscription?.character_count || 0);
        result.style.color = 'var(--you)';
        result.textContent = `✓ 成功！本月剩餘 ${remaining} 字元`;
      } else {
        result.style.color = 'var(--host)';
        result.textContent = `❌ HTTP ${r.status}`;
      }
    } catch (e) {
      result.style.color = 'var(--host)';
      result.textContent = `❌ ${e.message}`;
    }
  }
}

function setSpeed(btn, s) {
  document.querySelectorAll('.speed-pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  speechRate = s;
  localStorage.setItem('mirror_rate', s);
}
document.querySelectorAll('.speed-pill').forEach(b => {
  if (parseFloat(b.getAttribute('onclick').match(/[\d.]+/)[0]) === speechRate) {
    document.querySelectorAll('.speed-pill').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
  }
});

function openSheet() { document.getElementById('sheet-mask').classList.add('show'); document.getElementById('sheet').classList.add('show'); }
function closeSheet() { document.getElementById('sheet-mask').classList.remove('show'); document.getElementById('sheet').classList.remove('show'); }

async function forceReload() {
  // Bust HTML cache via query string; keep audio cache (hardtalk-audio-v1) intact
  location.href = location.pathname + '?_=' + Date.now();
}

// ===== List =====
function renderList() {
  const done = JSON.parse(localStorage.getItem('hardtalk_done') || '[]');
  let html = '';
  episodes.forEach(ep => {
    const isDone = done.includes(ep.id);
    html += `<div class="ep-row ${isDone ? 'done' : ''}" onclick="openEpisode('${ep.id}')">
      <div class="ep-row-top">
        <span class="ep-num ${isDone ? 'done' : ''}">${ep.num}${isDone ? ' ✓' : ''}</span>
        <span class="ep-tag">${ep.tag}</span>
      </div>
      <div class="ep-title">${ep.title}</div>
    </div>`;
  });
  document.getElementById('ep-list').innerHTML = html;
}

function openEpisode(id) {
  stopAll();
  currentEpId = id;
  const ep = episodes.find(e => e.id === id);
  if (!ep) return;
  document.getElementById('topbar-title').textContent = ep.num;
  document.getElementById('ep-num').textContent = ep.num + ' · ' + ep.tag;
  document.getElementById('ep-name').textContent = ep.title;
  document.getElementById('ep-tagline').textContent = ep.tagline;
  renderLines(ep.lines);
  document.getElementById('list-view').classList.add('hide');
  document.getElementById('player-view').classList.add('show');
  const idx = episodes.findIndex(e => e.id === id);
  document.getElementById('prev-btn').disabled = (idx === 0);
  document.getElementById('next-btn').disabled = (idx === episodes.length - 1);
  updateDoneBtn();
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-now').textContent = '0:00';
  document.getElementById('engine-now').textContent = '尚未播放';
  window.scrollTo(0, 0);
  showEn = false; showTw = false;
  document.getElementById('cc-en-btn').classList.remove('on');
  document.getElementById('cc-tw-btn').classList.remove('on');
  document.getElementById('transcript').classList.remove('show');
}

function backToList() {
  stopAll();
  document.getElementById('list-view').classList.remove('hide');
  document.getElementById('player-view').classList.remove('show');
  document.getElementById('topbar-title').textContent = 'HARDtalk';
  currentEpId = null;
  renderList();
}

function navPrev() {
  const idx = episodes.findIndex(e => e.id === currentEpId);
  if (idx > 0) openEpisode(episodes[idx - 1].id);
}
function navNext() {
  const idx = episodes.findIndex(e => e.id === currentEpId);
  if (idx < episodes.length - 1) openEpisode(episodes[idx + 1].id);
}

function renderLines(lines) {
  document.getElementById('lines').innerHTML = lines.map((line, i) => `
    <div class="line ${line.role}" data-idx="${i}" onclick="speakLineByIdx(${i})">
      <div class="line-speaker">${line.role === 'host' ? '👔 STEPHEN' : '🎯 YOU'}</div>
      <div class="line-en ${showEn ? 'show' : ''}">${line.en}</div>
      <div class="line-tw ${showTw ? 'show' : ''}">${line.tw}</div>
    </div>
  `).join('');
}

function toggleCC(type) {
  if (type === 'en') { showEn = !showEn; document.getElementById('cc-en-btn').classList.toggle('on', showEn); }
  else { showTw = !showTw; document.getElementById('cc-tw-btn').classList.toggle('on', showTw); }
  document.getElementById('transcript').classList.toggle('show', showEn || showTw);
  document.querySelectorAll('.line-en').forEach(el => el.classList.toggle('show', showEn));
  document.querySelectorAll('.line-tw').forEach(el => el.classList.toggle('show', showTw));
}

function markDone() {
  let done = JSON.parse(localStorage.getItem('hardtalk_done') || '[]');
  if (done.includes(currentEpId)) done = done.filter(x => x !== currentEpId);
  else done.push(currentEpId);
  localStorage.setItem('hardtalk_done', JSON.stringify(done));
  updateDoneBtn();
}
function updateDoneBtn() {
  const done = JSON.parse(localStorage.getItem('hardtalk_done') || '[]');
  const btn = document.getElementById('done-btn');
  if (done.includes(currentEpId)) { btn.classList.add('done'); btn.textContent = '✓ 已讀熟（按取消）'; }
  else { btn.classList.remove('done'); btn.textContent = '✓ 標記讀熟'; }
}

// ===== Voices =====
let browserVoices = [];
let chosenBrowserVoice = null;
function loadBrowserVoices() {
  browserVoices = speechSynthesis.getVoices();
  const en = browserVoices.filter(v => v.lang.startsWith('en'));
  if (en.length === 0) return;
  chosenBrowserVoice = en.find(v => v.name.includes('Daniel') || v.name.includes('Samantha')) || en[0];
}
if ('speechSynthesis' in window) { loadBrowserVoices(); speechSynthesis.onvoiceschanged = loadBrowserVoices; }

let currentAudio = null;
let abortRequested = false;
let progressTimer = null;

function stopAll() {
  abortRequested = true;
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.line.playing').forEach(el => el.classList.remove('playing'));
  if (progressTimer) clearInterval(progressTimer);
  const btn = document.getElementById('big-play');
  if (btn) { btn.innerHTML = '▶'; btn.classList.remove('playing', 'loading'); }
  const fill = document.getElementById('progress-fill');
  if (fill) fill.classList.remove('playing');
}

function stripEm(t) { return t.replace(/<\/?em>/g, ''); }

function speakBrowser(text, rate) {
  document.getElementById('engine-now').textContent = '🔊 瀏覽器內建';
  document.getElementById('engine-now').style.color = 'var(--text-3)';
  return new Promise((resolve) => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.rate = rate;
    if (chosenBrowserVoice) u.voice = chosenBrowserVoice;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

async function speakLineByIdx(idx) {
  if (!currentEpId) return;
  stopAll();
  abortRequested = false;
  const ep = episodes.find(e => e.id === currentEpId);
  const line = ep.lines[idx];
  const el = document.querySelector(`.line[data-idx="${idx}"]`);
  if (el) el.classList.add('playing');
  try {
    const cached = await fetchLineAudio(line, speechRate, currentEpId, idx);
    if (cached) {
      const label = cached.source === 'cache' ? '💾 快取' : cached.source === 'openai' ? '🎙️ OpenAI' : '🎙️ ElevenLabs';
      document.getElementById('engine-now').textContent = label;
      document.getElementById('engine-now').style.color = 'var(--you)';
      await playBlob(cached);
    } else {
      await speakBrowser(stripEm(line.en), speechRate);
    }
  } catch (e) {
    console.error('speakLineByIdx error:', e);
    await speakBrowser(stripEm(line.en), speechRate);
  }
  if (el) el.classList.remove('playing');
}

function pause(s) { return new Promise(r => setTimeout(r, s * 1000)); }
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

async function fetchLineAudio(line, rate, epId, idx) {
  const staticUrl = `audio/${epId}/${idx}.mp3`;

  // 1) Cache Storage — persistent across sessions, survives reloads
  if ('caches' in window) {
    try {
      const cache = await caches.open(AUDIO_CACHE_NAME);
      const hit = await cache.match(staticUrl);
      if (hit) return { blob: await hit.blob(), playbackRate: rate / 0.92, source: 'cache' };
    } catch (e) { /* fall through */ }
  }

  // 2) Network — pre-baked file from GitHub Pages; pin it into Cache Storage
  try {
    const r = await fetch(staticUrl);
    if (r.ok) {
      if ('caches' in window) {
        try {
          const cache = await caches.open(AUDIO_CACHE_NAME);
          await cache.put(staticUrl, r.clone());
        } catch (e) { /* ignore — still return the blob */ }
      }
      return { blob: await r.blob(), playbackRate: rate / 0.92, source: 'cache' };
    }
  } catch (e) { /* fall through to live API */ }

  const text = stripEm(line.en);
  if (provider === 'openai' && openaiKey) {
    const voice = line.role === 'host' ? 'onyx' : 'echo';
    const r = await fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${openaiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'tts-1', input: text, voice, speed: rate })
    });
    if (!r.ok) throw new Error(`OpenAI ${r.status}: ${(await r.text()).slice(0, 120)}`);
    return { blob: await r.blob(), playbackRate: 1, source: 'openai' };
  }
  if (provider === 'elevenlabs' && elevenLabsKey) {
    const voiceId = line.role === 'host' ? ELEVEN_HOST : ELEVEN_YOU;
    const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
      method: 'POST',
      headers: { 'xi-api-key': elevenLabsKey, 'Content-Type': 'application/json', 'Accept': 'audio/mpeg' },
      body: JSON.stringify({ text, model_id: 'eleven_turbo_v2_5', voice_settings: { stability: 0.5, similarity_boost: 0.75, style: 0.3, use_speaker_boost: true } })
    });
    if (!r.ok) throw new Error(`ElevenLabs ${r.status}`);
    return { blob: await r.blob(), playbackRate: rate / 0.92, source: 'elevenlabs' };
  }
  return null;
}

function playBlob(cached) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(cached.blob);
    const audio = new Audio(url);
    if (cached.playbackRate && cached.playbackRate !== 1) audio.playbackRate = cached.playbackRate;
    currentAudio = audio;
    const done = () => { URL.revokeObjectURL(url); resolve(); };
    audio.onended = done;
    audio.onerror = (e) => { console.error('audio.onerror', e); done(); };
    const p = audio.play();
    if (p && p.catch) p.catch(e => { console.error('audio.play() rejected:', e); done(); });
  });
}

async function playFull() {
  if (!currentEpId) return;
  const btn = document.getElementById('big-play');
  const fill = document.getElementById('progress-fill');
  const engineLabel = document.getElementById('engine-now');
  if (btn.classList.contains('playing')) { stopAll(); return; }
  stopAll();
  abortRequested = false;
  const ep = episodes.find(e => e.id === currentEpId);
  const lines = ep.lines;
  audioCache = {};

  btn.classList.add('loading');
  btn.innerHTML = '⋯';
  let done = 0, failed = 0;
  engineLabel.textContent = `⏳ 載入中 0/${lines.length}`;
  engineLabel.style.color = 'var(--text-3)';
  await Promise.all(lines.map((line, i) =>
    fetchLineAudio(line, speechRate, currentEpId, i)
      .then(cached => { if (cached) audioCache[i] = cached; })
      .catch(e => { console.error(`Line ${i} prefetch failed:`, e); failed++; })
      .finally(() => {
        done++;
        engineLabel.textContent = `⏳ 載入中 ${done}/${lines.length}` + (failed ? ` (${failed} 失敗)` : '');
      })
  ));
  if (abortRequested) return;
  btn.classList.remove('loading');

  const sources = Object.values(audioCache).map(c => c.source);
  const allCache = sources.length && sources.every(s => s === 'cache');
  const anyCache = sources.some(s => s === 'cache');
  const anyOpenAI = sources.some(s => s === 'openai');
  const anyEleven = sources.some(s => s === 'elevenlabs');

  btn.innerHTML = '◼';
  btn.classList.add('playing');
  fill.classList.add('playing');
  if (allCache) { engineLabel.textContent = '💾 快取'; engineLabel.style.color = 'var(--you)'; }
  else if (anyCache && (anyOpenAI || anyEleven)) { engineLabel.textContent = '💾 快取 + 🎙️ 即時'; engineLabel.style.color = 'var(--you)'; }
  else if (anyOpenAI) { engineLabel.textContent = '🎙️ OpenAI'; engineLabel.style.color = 'var(--you)'; }
  else if (anyEleven) { engineLabel.textContent = '🎙️ ElevenLabs'; engineLabel.style.color = 'var(--you)'; }
  else { engineLabel.textContent = '🔊 瀏覽器內建'; engineLabel.style.color = 'var(--text-3)'; }

  const estSec = lines.reduce((sum, l) => sum + (stripEm(l.en).length / 5) / (150 / 60) + 0.6, 0);
  document.getElementById('time-total').textContent = formatTime(estSec);
  let elapsed = 0;
  progressTimer = setInterval(() => {
    elapsed += 0.1;
    fill.style.width = Math.min((elapsed / estSec) * 100, 100) + '%';
    document.getElementById('time-now').textContent = formatTime(elapsed);
  }, 100);

  for (let i = 0; i < lines.length; i++) {
    if (abortRequested) break;
    const el = document.querySelector(`.line[data-idx="${i}"]`);
    if (el) el.classList.add('playing');
    if (audioCache[i]) {
      await playBlob(audioCache[i]);
    } else {
      await speakBrowser(stripEm(lines[i].en), speechRate);
    }
    if (el) el.classList.remove('playing');
    if (abortRequested) break;
    await pause(0.4);
  }

  clearInterval(progressTimer);
  if (!abortRequested) {
    btn.innerHTML = '↻';
    btn.classList.remove('playing');
    fill.classList.remove('playing');
    fill.style.width = '100%';
    document.getElementById('time-now').textContent = formatTime(estSec);
  }
  audioCache = {};
}
</script>
